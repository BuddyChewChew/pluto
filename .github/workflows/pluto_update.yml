name: Update Pluto Playlists
on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # These correspond to the keys in the x_forward dictionary in the script
        region: [uk, ca, fr, us_east, us_west]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        env:
          PLUTO_REGION: ${{ matrix.region }}
          PLUTO_USERNAME: ${{ secrets.PLUTO_USERNAME }}
          PLUTO_PASSWORD: ${{ secrets.PLUTO_PASSWORD }}
        run: python pluto_provider.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.m3u
          # Commit only if files changed to prevent workflow failure
          if git diff --cached --quiet; then
            echo "No changes detected for region ${{ matrix.region }}"
          else
            git commit -m "Update Pluto Playlist: ${{ matrix.region }}"
            git push
          fi
